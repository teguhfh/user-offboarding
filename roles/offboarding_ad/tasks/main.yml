---
# tasks file for roles/offboarding_ad

- name: Query current userAccountControl for target user
  community.general.ldap_search:
    dn: "{{ ldap_search_base }}"
    server_uri: "{{ ldap_server_uri }}"
    bind_dn: "{{ ldap_bind_dn }}"
    bind_pw: "{{ ldap_bind_password }}"
    scope: "children"
    filter: "(sAMAccountName={{ target_samaccountname }})"
    attrs:
      - dn
      - userAccountControl
  register: ldap_result
  no_log: false


- name: Fail if user not found
  ansible.builtin.fail:
    msg: "User {{ target_samaccountname }} not found in AD"
  when: ldap_result.results | length == 0

- name: Set facts from query result
  ansible.builtin.set_fact:
    user_dn: "{{ ldap_result.results[0].dn }}"
    current_uac: "{{ ldap_result.results[0].userAccountControl[0] | int }}"

- name: Determine if account is currently disabled
  ansible.builtin.set_fact:
    is_disabled: "{{ ((current_uac | int // uac_disable_bit | int) % 2) == 1 }}"

- name: Show current status
  ansible.builtin.debug:
    msg: "User {{ target_samaccountname }} ({{ user_dn }}) - current UAC: {{ current_uac }}, disabled: {{ is_disabled }}"

- name: Calculate new UAC value with disable bit set
  ansible.builtin.set_fact:
    new_uac: "{{ (current_uac | int) + (uac_disable_bit | int) }}"
  when: not is_disabled



